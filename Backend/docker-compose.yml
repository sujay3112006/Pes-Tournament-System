version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: football_tournament_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: football_tournament
    volumes:
      - mongo_data:/data/db
    networks:
      - football_network

  # Redis for Cache and Celery
  redis:
    image: redis:7-alpine
    container_name: football_tournament_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - football_network

  # Django Backend
  backend:
    build: .
    container_name: football_tournament_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-your-secret-key-change-in-production
      - MONGO_HOST=mongodb://mongo:27017
      - MONGO_DB_NAME=football_tournament
      - REDIS_URL=redis://redis:6379/1
      - CHANNELS_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis
    networks:
      - football_network

  # Celery Worker
  celery_worker:
    build: .
    container_name: football_tournament_celery
    command: celery -A core worker -l info
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-your-secret-key-change-in-production
      - MONGO_HOST=mongodb://mongo:27017
      - MONGO_DB_NAME=football_tournament
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis
      - backend
    networks:
      - football_network

  # Celery Beat (Scheduler)
  celery_beat:
    build: .
    container_name: football_tournament_celery_beat
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-your-secret-key-change-in-production
      - MONGO_HOST=mongodb://mongo:27017
      - MONGO_DB_NAME=football_tournament
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - mongo
      - redis
      - backend
    networks:
      - football_network

volumes:
  mongo_data:
  redis_data:

networks:
  football_network:
    driver: bridge
